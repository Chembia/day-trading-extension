<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=DM+Sans:wght@400;500;600;700&family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/common.css">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <header class="popup-header">
            <h1 class="fluey-brand">fluey</h1>
            <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
        </header>
        
        <div class="glass-container">
            <div id="errorMessage" class="error-message"></div>
            
            <form id="analysisForm">
                <div class="form-group">
                    <label for="symbol">Stock Symbol</label>
                    <input 
                        type="text" 
                        id="symbol" 
                        class="glass-input" 
                        placeholder="e.g., AAPL, TSLA, SPY"
                        required
                        maxlength="10"
                    >
                </div>
                
                <div class="form-group">
                    <label for="startDate">Start Date &amp; Time</label>
                    <input 
                        type="datetime-local" 
                        id="startDate" 
                        class="glass-input" 
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="endDate">End Date &amp; Time</label>
                    <input 
                        type="datetime-local" 
                        id="endDate" 
                        class="glass-input" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="interval">Interval</label>
                    <select id="interval" class="glass-input">
                        <option value="1min">1 Minute</option>
                        <option value="5min">5 Minutes</option>
                        <option value="15min">15 Minutes</option>
                        <option value="30min">30 Minutes</option>
                        <option value="45min">45 Minutes</option>
                        <option value="1h">1 Hour</option>
                        <option value="2h">2 Hours</option>
                        <option value="4h">4 Hours</option>
                        <option value="1day" selected>1 Day</option>
                        <option value="1week">1 Week</option>
                        <option value="1month">1 Month</option>
                    </select>
                </div>
                
                <button type="submit" id="analyzeBtn" class="glass-button">
                    Analyze Patterns
                </button>
            </form>
            
            <div class="info-section">
                <p class="small-text">
                    Powered by Fluey Algorithm • 33+ Patterns
                </p>
            </div>
        </div>
    </div>
    
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content glass-container">
            <div class="modal-header">
                <h2>⚙️ Settings</h2>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label class="setting-label">Theme</label>
                    <div class="theme-toggle">
                        <button class="theme-option active" data-theme="light">☀️ Light</button>
                        <button class="theme-option" data-theme="dark">🌙 Dark</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="close-settings" class="glass-button">Close</button>
            </div>
        </div>
    </div>
    
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <div class="loading-text">Analyzing patterns...</div>
    </div>
    
    <script src="../scripts/api-client.js"></script>
    <script src="../scripts/theme-manager.js"></script>
    <script src="popup.js"></script>
</body>
</html>
